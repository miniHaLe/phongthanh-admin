services:
  - type: web
    name: phongthanh-admin-minihale
    runtime: static
    buildCommand: npm ci && npm run build:prod
    staticPublishPath: dist
    envVars:
      - key: VITE_REAL_RESOURCES
        value: khach-hang
      - key: VITE_API_URL
        value: https://phongthanh-admin-api-minihale.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: phongthanh-admin-api-minihale
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate && npm run seed
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24
      - key: DATABASE_URL
        fromDatabase:
          name: phongthanh-admin-db-minihale
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        value: https://phongthanh-admin-minihale.onrender.com,https://minihale.github.io
      - key: REFRESH_COOKIE_SAME_SITE
        value: none

databases:
  - name: phongthanh-admin-db-minihale
    databaseName: phongthanh
    user: phongthanh
    plan: free
