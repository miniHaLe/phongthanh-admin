# nginx serving the built SPA + reverse-proxying the API on the same origin.
# Same-origin means the frontend calls /api/... and /auth/... with no CORS and
# the httpOnly refresh cookie (Path=/auth/refresh) just works.
server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Proxy the API. `api` is the compose service name; 3210 its port.
    location /api/ {
        proxy_pass         http://api:3210;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass         http://api:3210;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback: every unknown path serves index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
