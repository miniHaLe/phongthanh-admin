<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <title>Redirecting...</title>
    <script>
      ;(function () {
        var path = window.location.pathname
        var search = window.location.search
        var hash = window.location.hash
        window.location.replace('/#' + path + search + hash)
      })()
    </script>
  </head>
  <body></body>
</html>
