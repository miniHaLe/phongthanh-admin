<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phong Thành — Quản trị sửa chữa &amp; bảo hành</title>
    <script>
      // Apply persisted theme synchronously before hydration to avoid a flash.
      ;(function () {
        try {
          var raw = localStorage.getItem('pt-app')
          var theme = raw ? JSON.parse(raw)?.state?.theme : null
          var dark =
            theme === 'dark' ||
            ((!theme || theme === 'system') &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
