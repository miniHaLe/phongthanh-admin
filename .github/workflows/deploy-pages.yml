name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_url:
        description: Override vars.API_URL for this deploy
        required: false
        type: string
      skip_health_gate:
        description: Emergency only - skip API readiness and release-capability checks
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Validate API URL
        env:
          API_URL: ${{ github.event.inputs.api_url || vars.API_URL }}
        run: |
          if [[ -z "${API_URL//[[:space:]]/}" ]]; then
            echo "API_URL is required. Set the API_URL repository variable or provide the workflow_dispatch api_url input."
            exit 1
          fi
          if [[ ! "$API_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "API_URL must be an absolute HTTP(S) URL without whitespace."
            exit 1
          fi
      - name: Check API readiness
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_health_gate != 'true' }}
        env:
          API_URL: ${{ github.event.inputs.api_url || vars.API_URL }}
        run: curl -sf --retry 5 --retry-delay 10 "${API_URL%/}/health/ready"
      - name: Check API release capability
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.skip_health_gate != 'true' }}
        env:
          API_URL: ${{ github.event.inputs.api_url || vars.API_URL }}
        run: |
          status="$(curl -sS -o /dev/null -w '%{http_code}' --retry 5 --retry-delay 10 -H 'ngrok-skip-browser-warning: true' "${API_URL%/}/api/v1/tin-tuc?page=1&pageSize=1")"
          if [[ "$status" != "401" ]]; then
            echo "Compatible API must expose protected tin-tuc and return 401 without a token; received HTTP $status."
            exit 1
          fi
      - run: npm ci
      - run: npm run build:prod
        env:
          VITE_REAL_RESOURCES: khach-hang,nguoi-dung,nhom-quyen,chi-nhanh,don-vi-tinh,nhom-san-pham,nhom-hang-hoa,nha-san-xuat,thoi-han,nha-kho,phuong-xa,khu-vuc,loi-sua-chua,ngan-chua,san-pham,hang-hoa,model,phi-giao,ngan-hang,dia-ly,tin-tuc
          VITE_API_URL: ${{ github.event.inputs.api_url || vars.API_URL }}
          VITE_ROUTER_MODE: hash
          VITE_BASE_PATH: /phongthanh-admin/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
