name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_url:
        description: Public API URL, e.g. your MacBook ngrok HTTPS URL
        required: false
        default: https://phongthanh-admin-api-minihale.onrender.com

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build:prod
        env:
          VITE_REAL_RESOURCES: khach-hang
          VITE_API_URL: ${{ github.event.inputs.api_url || 'https://phongthanh-admin-api-minihale.onrender.com' }}
          VITE_ROUTER_MODE: hash
          VITE_BASE_PATH: /phongthanh-admin/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
